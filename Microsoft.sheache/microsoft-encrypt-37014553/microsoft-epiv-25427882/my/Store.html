<!DOCTYPE html>
<html>
<head>
    <title>qBittorrent Client</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { margin-bottom: 20px; }
        .add-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 5px;
            color: white;
        }
        button {
            padding: 10px 20px;
            background: #e94560;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
        }
        .torrent-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            background: #e94560;
            height: 100%;
            transition: width 0.3s;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            font-size: 12px;
            margin: 10px 0;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 qBittorrent Client <span style="font-size: 12px;">(Fallback Mode)</span></h1>
        <div class="add-section">
            <input type="text" id="magnetInput" placeholder="Magnet link or torrent URL...">
            <button onclick="addTorrent()">Add</button>
        </div>
        <div id="torrentsList">
            <div class="empty-state">Loading torrents...</div>
        </div>
    </div>

    <script>
        let refreshInterval = setInterval(loadTorrents, 1000);

        async function addTorrent() {
            const magnet = document.getElementById('magnetInput').value;
            if (!magnet) return alert('Enter a magnet link');

            await fetch('/api/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({magnet: magnet})
            });
            document.getElementById('magnetInput').value = '';
            loadTorrents();
        }

        async function loadTorrents() {
            try {
                const res = await fetch('/api/torrents');
                const torrents = await res.json();
                if (torrents.error) throw new Error(torrents.error);

                if (torrents.length === 0) {
                    document.getElementById('torrentsList').innerHTML = '<div class="empty-state">No torrents. Add a magnet link!</div>';
                    return;
                }

                document.getElementById('torrentsList').innerHTML = torrents.map(t => `
                    <div class="torrent-card">
                        <strong>${escapeHtml(t.name)}</strong>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${t.progress}%"></div>
                        </div>
                        <div class="stats">
                            <span>⬇️ ${t.download_speed} KB/s</span>
                            <span>⬆️ ${t.upload_speed} KB/s</span>
                            <span>📦 ${t.size} GB</span>
                        </div>
                        <button onclick="pauseTorrent('${t.hash}')">Pause</button>
                        <button onclick="resumeTorrent('${t.hash}')">Resume</button>
                        <button onclick="removeTorrent('${t.hash}')">Remove</button>
                    </div>
                `).join('');
            } catch(e) {
                console.error(e);
            }
        }

        async function pauseTorrent(hash) { await fetch(`/api/pause/${hash}`, {method: 'POST'}); loadTorrents(); }
        async function resumeTorrent(hash) { await fetch(`/api/resume/${hash}`, {method: 'POST'}); loadTorrents(); }
        async function removeTorrent(hash) { if(confirm('Remove?')) await fetch(`/api/remove/${hash}`, {method: 'DELETE'}); loadTorrents(); }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({'&':'&amp;', '<':'&lt;', '>':'&gt;'})[m]);
        }

        loadTorrents();
    </script>
</body>
</html>
